global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Uncomment once Pi is added to Tailscale/LAN
  # - job_name: 'pi'
  #   static_configs:
  #     - targets: ['REPLACE_WITH_PI_IP:9100']
